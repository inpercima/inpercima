<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Inpercima – Engineering Overview</title>

  <!-- Tailwind CDN -->
  <script src="https://cdn.tailwindcss.com"></script>

  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: "#0f172a"
          }
        }
      }
    }
  </script>
</head>

<body class="bg-slate-950 text-slate-200 min-h-screen">

  <div class="max-w-6xl mx-auto px-6 py-12">

    <h1 class="text-4xl font-bold mb-2">Inpercima</h1>
    <p class="text-slate-400 mb-8">
      Engineering Overview – Auto-discovered via GitHub API
    </p>

    <div class="mb-6">
      <input
        id="filterInput"
        type="text"
        placeholder="Filter by topic (e.g. angular, docker)"
        class="w-full md:w-96 px-4 py-2 rounded-lg bg-slate-800 border border-slate-700 focus:outline-none focus:ring-2 focus:ring-blue-500"
      />
    </div>

    <div class="overflow-x-auto">
      <table class="w-full border-collapse">
        <thead>
          <tr class="border-b border-slate-700 text-left text-sm uppercase text-slate-400">
            <th class="py-3">Repository</th>
            <th class="py-3">Language</th>
            <th class="py-3">Topics</th>
            <th class="py-3">Stars</th>
            <th class="py-3">Updated</th>
          </tr>
        </thead>
        <tbody id="repoTable" class="text-sm"></tbody>
      </table>
    </div>

  </div>

  <script src="app.js"></script>
</body>
</html>
